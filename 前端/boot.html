<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Alert 示例</title>
    <!-- 1. 先引入 Bootstrap 核心 CSS（必须） -->
    <link rel="stylesheet" href="https://cdn.staticfile.net/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- 2. 引入 jQuery（Bootstrap 3 的 JS 依赖 jQuery） -->
    <script src="https://cdn.staticfile.net/jquery/2.1.1/jquery.min.js"></script>
    <!-- 3. 引入 Bootstrap JS -->
    <script src="https://cdn.staticfile.net/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>
<body>
    <!-- Bootstrap 3 支持的 Alert 样式（去掉 3 不支持的 light/dark） -->
    <div class="container" style="margin-top: 20px;">
        <div class="alert alert-primary" role="alert">
            A simple primary alert—check it out!
        </div>
        <div class="alert alert-success" role="alert">
            A simple success alert—check it out!
        </div>
        <div class="alert alert-info" role="alert">
            A simple info alert—check it out!
        </div>
        <div class="alert alert-warning" role="alert">
            A simple warning alert—check it out!
        </div>
        <div class="alert alert-danger" role="alert">
            A simple danger alert—check it out!
        </div>
    </div>
</body>
</html>
