<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Font Awesome 图标库 -->
    <!-- https://fontawesome.com/v4/icons/ 查询 -->
    <!-- 1. 矢量图标 图标由代码定义（不是图片） 可以任意缩放 改变样式 不会失真模糊  
        矢量图用点 线 曲线 多边形等集合元素的坐标和参数来定义的 文件体积小（存储几何公式和属性） 
        位图（jpg png）存储每个像素的颜色信息 尺寸越大体积越大  -->
    <!-- 2. 样式控制 修改大小 颜色   -->
    <!-- 3. 兼容性好 免费开源  -->
</head>
<body>
    <i style="color: red; font-size: 50px;" class="fa fa-user-circle-o" aria-hidden="true"></i>
    <!-- fa 表示这是Font Awesome 图标    -->
    <!-- fa-user-circle-o 具体图标类  -->
    <!-- aria-hidden="true" 无障碍属性 告诉屏幕阅读器忽略图标 （仅装饰用到） -->
    <i class="fa fa-address-card-o" aria-hidden="true"></i>
</body>
</html>
