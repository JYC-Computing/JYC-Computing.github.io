<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            background-color: black;
        }
        .box{
            width: 900px;
            height: 700px;
            margin: 200px auto;
            /* background-color: cadetblue; */
        }
        .box div{
            float: left;
            width: 20px;
            height: 300px;
            margin: 50px;
            border-radius: 20px;
            animation:  run 2s infinite linear;
        }
        .box div:nth-child(1){
            background-color: rgb(245, 9, 5);
            box-shadow: 0 0 25px 10px rgb(245, 9, 5);
        }
        .box div:nth-child(2){
            background-color: rgb(245, 197, 5);
            box-shadow: 0 0 25px 10px rgb(245, 197, 5);
        }
        .box div:nth-child(3){
            background-color: rgb(117, 245, 5);
            box-shadow: 0 0 25px 10px rgb(117, 245, 5);
        }
        .box div:nth-child(4){
            background-color: rgb(221, 5, 245);
            box-shadow: 0 0 25px 10px rgb(221, 5, 245);
        }
        .box div:nth-child(5){
            background-color: rgb(245, 161, 5);
            box-shadow: 0 0 25px 10px rgb(245, 161, 5);
        }
 
        @keyframes run {
            0%{
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            50%{
                opacity: 0.2;
                transform: translateX(200%) scale(1.2);
            }
            100%{
                opacity: 0.2;
                transform: translateX(400%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
