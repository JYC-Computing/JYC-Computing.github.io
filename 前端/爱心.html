<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            position: relative;
            margin: 300px;
            width: 200px;
            height: 200px;
        }
        .left{
            width: 100px;
            height: 160px;
            background-color: red;
            border-radius: 50px 50px 0px 0px;
            transform: rotate(-45deg);
        }
        .right{
            position: absolute;
            top: 0;
            left: 43px;
            width: 100px;
            height: 160px;
            background-color: red;
            border-radius: 50px 50px 0px 0px;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="left"></div>
        <div class="right"></div>
    </div>
</body>
</html>
