<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI' , system-ui, sans-serif;    
        }
        body{
            background-color: #f9fafb;
            color: #1d2536;
            line-height: 1.5;
            padding: 20px;

        }
        .container{
            max-width: 800px;
            margin: 0 auto;
        }
        header{
            text-align: center;
            margin: 30px 0;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        header h1{
            font-size: 26px;
            color: #111827;
            align-items: center;
            justify-content: center;
        }
        header p{
            color: #6b7280;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .card{
            background: white;
            border-radius: 8px;
            padding: 22px;
            margin-bottom: 22px;
            box-shadow: 0 1px 0.2s ease;
        }
        .card:hover{
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);

        }
        .card h2{
         font-size: 18px;
      color: #111827;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
 
    .card h2 i {
      color: #3b82f6;
    }
 
    .products p {
      color: #6b7280;
      margin-bottom: 18px;
      font-size: 14px;
    }
 
    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
 
    .btn-primary {
      background-color: #3b82f6;
      color: white;
    }
 
    .btn-primary:hover {
      background-color: #2563eb;
      transform: translateY(-1px);
    }
 
    .btn-danger {
      background-color: #ef4444;
      color: white;
    }
 
    .btn-danger:hover {
      background-color: #dc2626;
      transform: translateY(-1px);
    }
 
    .product-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
 
    .cart-content {
      background-color: #f3f4f6;
      padding: 14px;
      border-radius: 6px;
      margin-bottom: 18px;
      border: 1px solid #e5e7eb;
    }
 
    .cart-content p {
      color: #4b5563;
      font-size: 14px;
    }
 
    #cartList {
      color: #3b82f6;
      font-weight: 500;
    }
 
    .message {
      padding: 11px 14px;
      border-radius: 6px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      font-size: 14px;
    }
 
    .success {
      background-color: #ecfdf5;
      color: #059669;
      border-color: #d1fae5;
    }
 
    .warning {
      background-color: #fffbeb;
      color: #d97706;
      border-color: #fef3c7;
    }
 
    .message i {
      font-size: 15px;
    }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fa fa-shopping-basket"></i>
                购物车案例
            </h1>
            <p>添加商品时自动去重，仅显示商品名称</p>
        </header>
 
        <div class="card products">
        <h2>
            <i class="fa fa-th-list"></i>
            商品列表
        </h2>
        <p>点击下方按钮添加商品到购物车</p>
        <div class="product-buttons">
            <button class="btn btn-primary" onclick="addToCart('智能手机')">
            <i class="fa fa-mobile"></i>
            智能手机
            </button>
            <button class="btn btn-primary" onclick="addToCart('笔记本电脑')">
            <i class="fa fa-laptop"></i>
            笔记本电脑
            </button>
            <button class="btn btn-primary" onclick="addToCart('无线耳机')">
            <i class="fa fa-headphones"></i>
            无线耳机
            </button>
            <button class="btn btn-primary" onclick="addToCart('机械键盘')">
            <i class="fa fa-keyboard-o"></i>
            机械键盘
            </button>
            <button class="btn btn-primary" onclick="addToCart('无线鼠标')">
            <i class="fa fa-mouse-pointer"></i>
            无线鼠标
            </button>
        </div>
        </div>
 
        <div class="card cart">
        <h2>
            <i class="fa fa-shopping-cart"></i>
            我的购物车
        </h2>
        <div class="cart-content">
            <p>当前购物车商品：<span id="cartList">空</span></p>
        </div>
        <div class="message" id="message"></div>
        <button class="btn btn-danger" onclick="clearCart()">
            <i class="fa fa-trash"></i>
            清空购物车
        </button>
        </div>
  </div>
  <script>
    let cart = [];
     
    function renderCart(){
        let cartList = document.getElementById('cartList');
        cartList.textContent = cart.length>0 ? cart.join(','):'空';
    }
    function showMessage(text,type){
        let message = document.getElementById('message');
        message.innerHTML = `<i class="fa ${type === 'success'? 'fa-check-circle' : 'fa-exclamation-circle'}">  <span>${text}</span>`;
        message.className = `message ${type}`
 
    }
 
    function addToCart(productName){
        if(cart.includes(productName)){
            showMessage(`${productName}已在购物车中，无需重复添加`,'warning')
 
        }else{
            cart.push(productName);
            showMessage(`${productName}已成功添加到购物车`,'success')
            renderCart()
        }
    }
 
    function clearCart(){
        cart = []
        renderCart()
        showMessage('购物车已经清空','success')
    }
  </script>
</body>
</html>
