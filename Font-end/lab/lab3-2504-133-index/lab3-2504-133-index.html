<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上书店</title>
    <link rel="stylesheet" href="css/lab3-2504-133-index.css">
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="logo">BOOK STORE</div>
        <nav class="nav-menu">
            <a href="#">首页</a>
            <a href="#">分类</a>
            <a href="#">购物车</a>
            <!-- 登录相关链接 -->
            <a onclick="showLoginDialog()">登录</a>
            <a onclick="showLoginDialog()">注册</a>
            <!-- 登录后显示 -->
            <span class="user-info">欢迎，<span id="usernameDisplay"></span></span>
            <a class="logout-btn" onclick="logout()">退出</a>
        </nav>
    </header>

    <!-- 遮罩层 -->
    <div class="mask" onclick="hideLoginDialog()"></div>

    <!-- 登录/注册对话框：父相子绝 -->
    <div class="login-dialog">
        <div class="dialog-header">
            <h2 id="dialogTitle">用户登录</h2>
            <span class="close-btn" onclick="hideLoginDialog()">&times;</span>
        </div>
        
        <!-- 登录/注册切换 -->
        <div class="dialog-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">登录</button>
            <button class="tab-btn" onclick="switchTab('register')">注册</button>
        </div>
        
        <div class="dialog-content">
            <!-- 登录表单 -->
            <div class="form-box active" id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="submit-btn" onclick="handleLogin()">登 录</button>
            </div>
            
            <!-- 注册表单 -->
            <div class="form-box" id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regConfirmPassword" placeholder="请再次输入密码">
                </div>
                <button class="submit-btn" onclick="handleRegister()">注 册</button>
            </div>
        </div>
    </div>

    <!-- 主体内容 -->
    <div class="main-container">
        <!-- 左侧栏 -->
        <aside class="sidebar-left">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>计算机科学</li>
                <li>艺术设计</li>
                <li>人文社科</li>
                <li>少儿读物</li>
            </ul>
        </aside>

        <!-- 中间内容 -->
        <section class="content-middle">
            <div class="book-showcase">
                <h3>精选图书</h3>
                <div class="book-grid">
                    <div class="book-card">
                        <img src="image/book1.jpg" alt="书名">
                        <p>《Web开发实战》</p>
                    </div>
                    <div class="book-card">
                        <img src="image/book2.jpg" alt="书名">
                        <p>《设计心理学》</p>
                    </div>
                    <div class="book-card">
                        <img src="image/book3.jpg" alt="书名">
                        <p>《现代历史》</p>
                    </div>
                </div>
            </div>

            <div class="hot-recommend clearfix">
                <h3>热门推荐</h3>
                <div class="rec-item">《网页设计基础与实战》</div>
                <div class="rec-item">《C++语言程序设计》</div>
                <span class="hot-tag">HOT!</span>
            </div>

            <div class="new-arrivals">
                <h3>新书上市</h3>
                <table>
                    <thead>
                        <tr>
                            <th>书名</th>
                            <th>作者</th>
                            <th>价格</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>深入理解计算机系统</td>
                            <td>Randal E. Bryant</td>
                            <td>¥128.00</td>
                        </tr>
                        <tr>
                            <td>JavaScript高级程序设计</td>
                            <td>Nicholas C. Zakas</td>
                            <td>¥89.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 右侧栏 -->
        <aside class="sidebar-right">
            <div class="promo-box">
                <h4>限时促销</h4>
                <p>全场图书满 200 减 100！</p>
                <button>立即抢购</button>
            </div>
        </aside>
    </div>

    <script>
        // 页面加载时检查登录状态
        window.onload = function() {
            var currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                var user = JSON.parse(currentUser);
                document.getElementById('usernameDisplay').textContent = user.username;
                document.body.classList.add('logged-in');
            }
        };

        // 显示登录对话框
        function showLoginDialog() {
            document.querySelector('.mask').style.display = 'block';
            document.querySelector('.login-dialog').style.display = 'block';
        }

        // 隐藏登录对话框
        function hideLoginDialog() {
            document.querySelector('.mask').style.display = 'none';
            document.querySelector('.login-dialog').style.display = 'none';
        }

        // Tab切换
        function switchTab(tab) {
            var tabs = document.querySelectorAll('.tab-btn');
            var loginForm = document.getElementById('loginForm');
            var registerForm = document.getElementById('registerForm');
            var title = document.getElementById('dialogTitle');

            if (tab === 'login') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                title.innerHTML = '用户登录';
            } else {
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                title.innerHTML = '用户注册';
            }
        }

        // 注册处理
        function handleRegister() {
            var username = document.getElementById('regUsername').value;
            var password = document.getElementById('regPassword').value;
            var confirmPassword = document.getElementById('regConfirmPassword').value;

            if (username === '' || password === '' || confirmPassword === '') {
                alert('请填写完整信息！');
                return;
            }

            if (password !== confirmPassword) {
                alert('两次密码不一致！');
                return;
            }

            // 从localStorage获取已有用户
            var users = JSON.parse(localStorage.getItem('users') || '[]');

            // 检查用户名是否已存在
            for (var i = 0; i < users.length; i++) {
                if (users[i].username === username) {
                    alert('用户名已存在！');
                    return;
                }
            }

            // 创建新用户
            var newUser = {
                username: username,
                password: password
            };

            // 保存到users数组
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            alert('注册成功！请登录');
            switchTab('login');
            
            // 清空表单
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
        }

        // 登录处理
        function handleLogin() {
            var username = document.getElementById('loginUsername').value;
            var password = document.getElementById('loginPassword').value;

            if (username === '' || password === '') {
                alert('请填写用户名和密码！');
                return;
            }

            // 从localStorage获取用户列表
            var users = JSON.parse(localStorage.getItem('users') || '[]');

            // 查找匹配的用户
            var loginSuccess = false;
            for (var i = 0; i < users.length; i++) {
                if (users[i].username === username && users[i].password === password) {
                    loginSuccess = true;
                    // 保存当前用户
                    localStorage.setItem('currentUser', JSON.stringify(users[i]));
                    break;
                }
            }

            if (loginSuccess) {
                document.getElementById('usernameDisplay').textContent = username;
                document.body.classList.add('logged-in');
                hideLoginDialog();
                alert('登录成功！');
            } else {
                alert('用户名或密码错误！');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            document.body.classList.remove('logged-in');
            alert('已退出登录');
        }
    </script>
</body>
</html>
